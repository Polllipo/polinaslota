<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Полiна Сльота — маленька художниця</title>
<meta name="description" content="Галерея малюнків Полiни Сльоти, маленької художниці з Горішніх Плавнів, Україна.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<style>
  :root{
    --paper:#fdf6e3;      /* warm cream paper */
    --paper-2:#fbeecb;
    --ink:#2b2320;        /* soft black */
    --tomato:#e8462b;     /* her hot red */
    --marigold:#f6b93b;   /* marigold yellow */
    --grass:#4caf50;      /* grass green */
    --sky:#4aa8d8;        /* sky blue */
    --grape:#8e5aa8;      /* the dragon/knight purple */
    --pink:#ef7fa4;
    --shadow: rgba(43,35,32,.16);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(246,185,59,.10) 0 22px, transparent 23px),
      radial-gradient(circle at 82% 8%, rgba(74,168,216,.10) 0 26px, transparent 27px),
      radial-gradient(circle at 68% 40%, rgba(232,70,43,.07) 0 20px, transparent 21px),
      radial-gradient(circle at 25% 70%, rgba(76,175,80,.08) 0 24px, transparent 25px);
    overflow-x:hidden;
  }

  /* ---------- floating doodles ---------- */
  .doodles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .doodle{position:absolute;opacity:.5;animation:float 9s ease-in-out infinite}
  .doodle:nth-child(2){animation-duration:11s;animation-delay:-2s}
  .doodle:nth-child(3){animation-duration:13s;animation-delay:-5s}
  .doodle:nth-child(4){animation-duration:10s;animation-delay:-1s}
  .doodle:nth-child(5){animation-duration:12s;animation-delay:-3s}
  .doodle:nth-child(6){animation-duration:14s;animation-delay:-6s}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(-6deg)}
    50%{transform:translateY(-26px) rotate(8deg)}
  }

  /* ---------- header ---------- */
  header{position:relative;z-index:2;text-align:center;padding:52px 20px 26px}
  .hi{
    display:inline-block;font-family:'Fredoka',sans-serif;font-weight:600;
    background:var(--sky);color:#fff;padding:7px 18px;border-radius:40px;
    transform:rotate(-3deg);font-size:1.05rem;margin-bottom:18px;
    box-shadow:3px 4px 0 var(--shadow);
  }
  h1{font-family:'Fredoka',sans-serif;font-weight:700;margin:0;line-height:.95;
     font-size:clamp(2.9rem,10vw,6.2rem);letter-spacing:-1px}
  h1 .word{display:inline-block}
  h1 .ch{display:inline-block;animation:wobble 4s ease-in-out infinite}
  @keyframes wobble{0%,100%{transform:rotate(var(--r)) translateY(0)}50%{transform:rotate(calc(var(--r) * -1)) translateY(-6px)}}
  .sub{font-family:'Fredoka',sans-serif;font-weight:500;margin:16px auto 0;max-width:640px;
       font-size:clamp(1rem,2.6vw,1.35rem);color:#6a5c54}
  .badges{margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .badge{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;
    padding:8px 16px;border-radius:30px;box-shadow:2px 3px 0 var(--shadow);transform:rotate(-2deg)}
  .badge:nth-child(2){transform:rotate(2deg)}
  .badge:nth-child(3){transform:rotate(-1deg)}
  .b-red{background:var(--tomato);color:#fff}
  .b-yellow{background:var(--marigold);color:var(--ink)}
  .b-green{background:var(--grass);color:#fff}

  /* squiggle divider */
  .squiggle{display:block;width:min(90%,720px);margin:34px auto 0;height:22px}

  /* ---------- gallery ---------- */
  main{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:30px 18px 40px}
  .intro{text-align:center;font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(1.3rem,4vw,2rem);margin:8px 0 34px}
  .intro span{color:var(--tomato)}
  .grid{
    columns:3;column-gap:26px;
  }
  @media(max-width:900px){.grid{columns:2}}
  @media(max-width:560px){.grid{columns:1;column-gap:0}}

  .card{
    break-inside:avoid;margin-bottom:26px;position:relative;cursor:pointer;
    background:#fff;padding:12px 12px 16px;border-radius:6px;
    box-shadow:4px 6px 0 var(--shadow);
    transform:rotate(var(--tilt));transition:transform .25s ease, box-shadow .25s ease;
    border:2px solid var(--ink);
  }
  .card:nth-child(odd){--tilt:-1.6deg}
  .card:nth-child(even){--tilt:1.6deg}
  .card:nth-child(3n){--tilt:1deg}
  .card:hover{transform:rotate(0deg) translateY(-6px) scale(1.02);box-shadow:7px 10px 0 var(--shadow);z-index:3}
  .card:focus-visible{outline:4px solid var(--sky);outline-offset:4px}
  .card img{width:100%;display:block;border-radius:3px;background:var(--paper-2)}
  .cap{font-family:'Fredoka',sans-serif;font-weight:600;text-align:center;
    margin-top:10px;font-size:1.02rem}
  .pin{position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    width:22px;height:22px;border-radius:50%;box-shadow:1px 2px 3px rgba(0,0,0,.3)}
  .card:nth-child(4n) .pin{background:var(--tomato)}
  .card:nth-child(4n+1) .pin{background:var(--sky)}
  .card:nth-child(4n+2) .pin{background:var(--marigold)}
  .card:nth-child(4n+3) .pin{background:var(--grass)}

  /* reveal on scroll */
  .card{opacity:0;transform:rotate(var(--tilt)) translateY(30px)}
  .card.show{opacity:1;transform:rotate(var(--tilt)) translateY(0);transition:opacity .5s ease, transform .5s ease}
  .card.show:hover{transform:rotate(0deg) translateY(-6px) scale(1.02)}

  /* ---------- contact ---------- */
  .contact{position:relative;z-index:2;max-width:640px;margin:20px auto 70px;padding:0 20px;text-align:center}
  .contact-card{
    background:var(--grape);color:#fff;border:3px solid var(--ink);
    border-radius:26px;padding:34px 26px;box-shadow:6px 8px 0 var(--shadow);
    transform:rotate(-1deg);
  }
  .contact-card h2{font-family:'Fredoka',sans-serif;font-weight:700;margin:0 0 6px;font-size:1.8rem}
  .contact-card p{margin:4px 0 22px;font-size:1.05rem;opacity:.95}
  .contact-card .mom{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.1rem;margin-bottom:20px}
  .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{font-family:'Fredoka',sans-serif;font-weight:600;text-decoration:none;
    padding:13px 24px;border-radius:40px;font-size:1.05rem;border:2px solid var(--ink);
    box-shadow:3px 4px 0 var(--shadow);transition:transform .15s ease}
  .btn:hover{transform:translateY(-3px) rotate(-2deg)}
  .btn-tg{background:var(--sky);color:#fff}
  .btn-ph{background:var(--marigold);color:var(--ink)}

  footer{position:relative;z-index:2;text-align:center;padding:0 20px 40px;color:#8a7c72;
    font-family:'Fredoka',sans-serif;font-size:.95rem}
  footer .heart{color:var(--tomato)}

  /* ---------- lightbox ---------- */
  .lb{position:fixed;inset:0;background:rgba(43,35,32,.9);z-index:50;display:none;
    align-items:center;justify-content:center;padding:24px;flex-direction:column}
  .lb.open{display:flex;animation:pop .3s ease}
  @keyframes pop{from{opacity:0}to{opacity:1}}
  .lb img{max-width:92vw;max-height:78vh;border-radius:6px;border:5px solid #fff;
    box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .lb .lbcap{color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;margin-top:16px;font-size:1.3rem}
  .lb-close{position:absolute;top:18px;right:22px;width:52px;height:52px;border-radius:50%;
    background:var(--tomato);color:#fff;border:3px solid #fff;font-size:1.6rem;cursor:pointer;
    font-family:'Fredoka',sans-serif;line-height:1;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:56px;height:56px;border-radius:50%;
    background:var(--marigold);color:var(--ink);border:3px solid #fff;font-size:1.8rem;cursor:pointer;
    font-family:'Fredoka',sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .lb-prev{left:16px}.lb-next{right:16px}
  @media(max-width:560px){.lb-nav{width:46px;height:46px;font-size:1.4rem}}

  @media(prefers-reduced-motion:reduce){
    *{animation:none!important}
    .card{opacity:1!important;transform:rotate(var(--tilt))!important}
  }
</style>
</head>
<body>

<div class="doodles" aria-hidden="true">
  <svg class="doodle" style="top:14%;left:6%" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#f6b93b" stroke-width="2.5"><path d="M12 2l2.6 6.5L21 9l-5 4.4L17.5 20 12 16.5 6.5 20 8 13.4 3 9l6.4-.5z"/></svg>
  <svg class="doodle" style="top:22%;right:7%" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e8462b" stroke-width="2.5"><path d="M12 21s-7-4.6-7-10a4 4 0 017-2.6A4 4 0 0119 11c0 5.4-7 10-7 10z"/></svg>
  <svg class="doodle" style="top:55%;left:4%" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#4aa8d8" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>
  <svg class="doodle" style="top:70%;right:6%" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2.5"><path d="M12 2l2.6 6.5L21 9l-5 4.4L17.5 20 12 16.5 6.5 20 8 13.4 3 9l6.4-.5z"/></svg>
  <svg class="doodle" style="top:40%;right:14%" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#8e5aa8" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg>
  <svg class="doodle" style="top:85%;left:16%" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#ef7fa4" stroke-width="2.5"><path d="M12 21s-7-4.6-7-10a4 4 0 017-2.6A4 4 0 0119 11c0 5.4-7 10-7 10z"/></svg>
</div>

<header>
  <span class="hi">Привіт! 👋</span>
  <h1 id="title"></h1>
  <p class="sub">Мені 8 років і я малюю котів, драконів, дерева і все на світі 🎨</p>
  <div class="badges">
    <span class="badge b-red">🏠 Горішні Плавні</span>
    <span class="badge b-yellow">🇺🇦 Україна</span>
    <span class="badge b-green">🖌️ 16 картин</span>
  </div>
  <svg class="squiggle" viewBox="0 0 720 22" fill="none" stroke="#e8462b" stroke-width="4" stroke-linecap="round" aria-hidden="true"><path d="M4 11c30-14 60 14 90 0s60-14 90 0 60 14 90 0 60-14 90 0 60 14 90 0 60-14 90 0 60 14 90 0"/></svg>
</header>

<main>
  <p class="intro">Моя <span>галерея</span> ✨</p>
  <div class="grid" id="grid"></div>
</main>

<section class="contact">
  <div class="contact-card">
    <h2>Хочете картину? 💌</h2>
    <p>Напишіть моїй мамі — вона все розкаже!</p>
    <div class="mom">👩 Ольга Хамчукова</div>
    <div class="btns">
      <a class="btn btn-tg" href="https://t.me/+380985600737" target="_blank" rel="noopener">✈️ Telegram</a>
      <a class="btn btn-ph" href="tel:+380985600737">📞 +380 98 560 07 37</a>
    </div>
  </div>
</section>

<footer>
  Намальовано з <span class="heart">♥</span> Полiною Сльотою · 2026
</footer>

<div class="lb" id="lb" aria-hidden="true">
  <button class="lb-close" id="lbClose" aria-label="Закрити">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Назад">‹</button>
  <img id="lbImg" src="" alt="">
  <div class="lbcap" id="lbCap"></div>
  <button class="lb-nav lb-next" id="lbNext" aria-label="Далі">›</button>
</div>

<script>
  // wobble name letters
  (function(){
    var name = "Полiна Сльота";
    var el = document.getElementById('title');
    var colors = ['#e8462b','#f6b93b','#4caf50','#4aa8d8','#8e5aa8','#ef7fa4'];
    name.split(' ').forEach(function(word, wi){
      var span = document.createElement('span'); span.className='word';
      word.split('').forEach(function(c, i){
        var s = document.createElement('span'); s.className='ch';
        s.textContent = c;
        var r = ((i+wi)%2===0? 1 : -1) * (2 + (i%3));
        s.style.setProperty('--r', r+'deg');
        s.style.color = colors[(i+wi) % colors.length];
        s.style.animationDelay = (i*0.12)+'s';
        span.appendChild(s);
      });
      el.appendChild(span);
      if(wi===0) el.appendChild(document.createTextNode('\u00A0'));
    });
  })();

  // artwork data
  var works = [
    {f:"01-airplane-girl.jpg", t:"Дівчинка і літак ✈️"},
    {f:"02-dragon-knight.jpg", t:"Дракон і лицар 🐉"},
    {f:"03-three-trees.jpg", t:"Три чарівні дерева 🌳"},
    {f:"04-rainbow-cat.jpg", t:"Веселковий кіт 🌈"},
    {f:"05-red-cat.jpg", t:"Червоний котик 🐱"},
    {f:"06-golden-mouse.jpg", t:"Золоте мишеня 🥇"},
    {f:"07-fruit-bowl.jpg", t:"Весела ваза з фруктами 🍎"},
    {f:"08-castle.jpg", t:"Замок 🏰"},
    {f:"09-funny-face.jpg", t:"Смішне личко 😜"},
    {f:"10-whale-island.jpg", t:"Кит-острів 🐋"},
    {f:"11-apple-orchard.jpg", t:"Яблуневий сад 🍏"},
    {f:"12-four-seasons-forest.jpg", t:"Ліс усіх кольорів 🍂"},
    {f:"13-wise-owl.jpg", t:"Мудра сова з книжкою 🦉"},
    {f:"14-mouse-in-rain.jpg", t:"Мишка під дощем ☔"},
    {f:"15-cat-and-sunflowers.jpg", t:"Кіт і соняхи 🌻"},
    {f:"16-happy-portrait.jpg", t:"Мій веселий портрет 🎉"}
  ];

  var grid = document.getElementById('grid');
  works.forEach(function(w, idx){
    var card = document.createElement('div');
    card.className='card'; card.tabIndex=0; card.setAttribute('role','button');
    card.setAttribute('aria-label', w.t);
    card.innerHTML =
      '<span class="pin"></span>'+
      '<img loading="lazy" src="img/'+w.f+'" alt="'+w.t+'">'+
      '<div class="cap">'+w.t+'</div>';
    card.addEventListener('click', function(){ openLB(idx); });
    card.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();openLB(idx);} });
    grid.appendChild(card);
  });

  // scroll reveal
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('show'); io.unobserve(en.target);} });
  }, {threshold:.12});
  document.querySelectorAll('.card').forEach(function(c){ io.observe(c); });

  // lightbox
  var lb=document.getElementById('lb'), lbImg=document.getElementById('lbImg'),
      lbCap=document.getElementById('lbCap'), cur=0;
  function openLB(i){ cur=i; render(); lb.classList.add('open'); lb.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
  function closeLB(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
  function render(){ lbImg.src='img/'+works[cur].f; lbImg.alt=works[cur].t; lbCap.textContent=works[cur].t; }
  function nav(d){ cur=(cur+d+works.length)%works.length; render(); }
  document.getElementById('lbClose').onclick=closeLB;
  document.getElementById('lbPrev').onclick=function(){nav(-1);};
  document.getElementById('lbNext').onclick=function(){nav(1);};
  lb.addEventListener('click',function(e){ if(e.target===lb) closeLB(); });
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')closeLB();
    if(e.key==='ArrowRight')nav(1);
    if(e.key==='ArrowLeft')nav(-1);
  });
</script>
</body>
</html>
